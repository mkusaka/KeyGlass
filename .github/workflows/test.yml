name: Test
on:
  workflow_call:
  push:
    tags-ignore:
      - 'v*'
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.3.9
          cache: false
      - name: Show Swift toolchain
        run: |
          xcrun swift --version
          xcodebuild -version
      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint .
      - name: SwiftLint check
        run: mise exec -- swiftlint lint --quiet
    timeout-minutes: 60
  unit-test:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Show Swift toolchain
        run: |
          xcrun swift --version
          xcodebuild -version
      - name: Run tests
        run: |
          xcodebuild -project KeyGlass.xcodeproj \
            -scheme KeyGlass \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            test
    timeout-minutes: 60
